version: 2

project_name: trackdown

before:
  hooks:
    - go mod tidy

builds:
  - id: trackdown
    main: ./cmd/trackdown
    binary: trackdown
    # Pure Go, no CGO -- the entire reason modernc.org/sqlite was chosen
    # over a CGO-based SQLite driver was to make single-command
    # cross-compilation like this trivial.
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: trackdown-archive
    ids:
      - trackdown
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - docs/**

checksum:
  name_template: "checksums.txt"

changelog:
  # goreleaser's default git-log-based changelog. The repo's history was
  # squashed to a single "Initial commit" before the real codebase was ever
  # pushed (see CLAUDE.md's "Git identity & history cleanup" note), so
  # v0.1.0's changelog is naturally just that one entry -- an accurate
  # reflection of "this is the first release," not a bug to work around.
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  # Publishing is now live: Kishore gave the explicit go-ahead to cut a real
  # v0.1.0 release. Runs via .github/workflows/release.yml on a `v*` tag
  # push, using the workflow's own GITHUB_TOKEN -- not from a local machine,
  # so releases are reproducible from CI regardless of who/what triggers the
  # tag push.
  github:
    owner: itskrsna
    name: Trackdown
  prerelease: auto # versions with a pre-release suffix (e.g. v0.1.0-rc1) are marked as such on GitHub
